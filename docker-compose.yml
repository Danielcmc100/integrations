services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "200:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-ui:
    build: .
    command: >
      uv run streamlit run admin_ui/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    env_file:
      - .env
    environment:
      - API_BASE=http://app:8000
    ports:
      - "201:8501"
    depends_on:
      - app
    restart: unless-stopped

  worker:
    build: .
    command: arq integration.worker.WorkerSettings
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: integrations
      POSTGRES_PASSWORD: integrations
      POSTGRES_DB: integrations
    ports:
      - "150:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U integrations" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "140:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
